baseURL: https://chinweikuan.github.io/
locale: en-us
title: Chin-Wei Kuan
theme: PaperMod
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Chin-Wei Kuan
  description: Thoughts on software engineering, AI, and building things.
  keywords: [Blog, Software Engineering, AI, Tech]
  author: Chin-Wei Kuan
  DateFormat: January 2, 2006
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShareButtons:
    - github
    - linkedin
    - whatsapp
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true

  label:
    text: Chin-Wei Kuan

  homeInfoParams:
    Title: Hi, I'm Chin-Wei
    Content: |
      An aspiring computer science researcher focused on ML/DL.  
      I am documenting my learning journey here. 🤘

  socialIcons:
    - name: github
      url: https://github.com/chinweikuan
    - name: linkedin
      url: https://www.linkedin.com/in/chinweikuan
    - name: whatsapp
      url: https://wa.me/1234567890
    - name: email
      url: mailto:kuan850619123@gmail.com

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    URL: https://github.com/chinweikuan/chinweikuan.github.io/tree/main/content
    Text: Suggest Changes
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: [title, permalink, summary, content]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON
